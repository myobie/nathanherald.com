<figure>
<canvas id="wave-canvas" width="560" height="400" style="width: 100%; max-width: 560px; cursor: crosshair; border-radius: 4px;"></canvas>
<figcaption>Click to add waves. They fade after a few seconds.</figcaption>
</figure>
<script>
(function() {
  const canvas = document.getElementById('wave-canvas')
  if (!canvas) return
  const ctx = canvas.getContext('2d')
  const waves = []
  const lifetime = 6000

  canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect()
    const scaleX = canvas.width / rect.width
    const scaleY = canvas.height / rect.height
    waves.push({
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY,
      t: performance.now()
    })
  })

  function draw(now) {
    const img = ctx.createImageData(canvas.width, canvas.height)
    const data = img.data

    // Remove expired waves
    while (waves.length > 0 && now - waves[0].t > lifetime) waves.shift()

    for (let y = 0; y < canvas.height; y++) {
      for (let x = 0; x < canvas.width; x++) {
        let sum = 0

        for (const w of waves) {
          const age = (now - w.t) / 1000
          const dx = x - w.x
          const dy = y - w.y
          const dist = Math.sqrt(dx * dx + dy * dy)
          const fade = Math.max(0, 1 - age / (lifetime / 1000))
          sum += Math.sin(dist * 0.05 - age * 4) * fade
        }

        const i = (y * canvas.width + x) * 4
        if (waves.length === 0) {
          data[i] = 245
          data[i + 1] = 244
          data[i + 2] = 240
          data[i + 3] = 255
        } else {
          const v = sum / Math.max(1, waves.length * 0.5)
          // Warm palette: positive toward amber, negative toward blue
          const r = Math.floor(128 + v * 120)
          const g = Math.floor(128 + v * 60)
          const b = Math.floor(128 - v * 100)
          data[i] = Math.max(0, Math.min(255, r))
          data[i + 1] = Math.max(0, Math.min(255, g))
          data[i + 2] = Math.max(0, Math.min(255, b))
          data[i + 3] = 255
        }
      }
    }

    ctx.putImageData(img, 0, 0)
    requestAnimationFrame(draw)
  }

  requestAnimationFrame(draw)
})()
</script>
